# ══════════════════════════════════════════════════════════════════════════
# Project A.R.I.A — Simulation Configuration
# Loaded once at startup by load_settings() (settings.cpp).
# Every key below is REQUIRED: a missing key throws std::runtime_error,
# ══════════════════════════════════════════════════════════════════════════

# ── Simulation / Window ─────────────────────────────────────────────────
[simulation]
vsync                    = false
full_screen               = false
ui_scale_percent          = 100.0
max_fps                   = 0            # 0 = uncapped

# ── Graphical ────────────────────────────────────────────────────────────
[graphical]
spring_thickness           = 9.0
spring_outline_thickness   = 6.0
cell_outline_thickness     = 1.3         # relative to cell radius
food_transparency          = 200         # 0-255

# ── World ────────────────────────────────────────────────────────────────
[world]
bounds_radius               = 48000
border_repulsion_magnitude  = 0.001
cells_x                     = 256    
cells_y                     = 256
cell_max_capacity           = 14

# ── Cell Manager ─────────────────────────────────────────────────────────
[cell_manager]
max_protozoa                = 70000     
initial_protozoa            = 16000     
auto_reset_on_extinction    = true

# ── Cell ─────────────────────────────────────────────────────────────────
[cell]
max_cells                  = 500000     
spawn_radius                = 50.0   
energy_decay_rate           = 0.03
wander_threshold             = 600.0
reproductive_cooldown        = 500
digestive_time                = 100
initial_energy                = 70.0
breaking_length                = 425.0
maximum_extension               = 380.0
spring_work_const                = 0.00001


# ── Food Manager ─────────────────────────────────────────────────────────
[food_manager]
max_food                    =  60000
initial_food                 = 50000

# ── Food ─────────────────────────────────────────────────────────────────
[food]
# spatial grid
cells_x                     = 256
cells_y                      = 256
cell_max_capacity             = 15
update_freq                    = 4

# physics
food_radius                  = 60.0
friction                      = 0.95
vibration_strength             = 0.12

# color / fade
food_visibility_ramp_frames  = 90.0
food_max_alpha                = 200.0

# birth
spawn_proportionality_constant = 0.0065
food_spawn_distance           = 200.0
reproductive_cooldown          = 520
reproductive_threshold          = 300

# nutrients
initial_nutrients             = 10.0
final_nutrients                = 80.0
nutrient_development_time       = 300

# death
death_age                     = 3300.0
death_age_chance               = 0.01